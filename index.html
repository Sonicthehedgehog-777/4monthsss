<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 4 Months Bachuu ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Ambient background -->
<div class="background">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="grain"></div>
</div>

<!-- Landing -->
<section id="landing" class="screen active">
  <div class="glass panel">
    <div class="sheen"></div>
    <p class="eyebrow">DID U THINK I FORGOT??</p>
    <h1>HAPPY 4 MONTHS<br>BACHUU ❤️</h1>
    <p class="sub">a lil surprise for my Jiyuu 🌸</p>

    <div class="envelopeArea">
      <div id="envelope">
        <div class="shadow"></div>
        <div class="body"></div>
        <div class="letterPreview">
          <span class="preview-text">Happy 4 Months ❤️</span>
          <span class="preview-heart">♡</span>
        </div>
        <div class="wax">❤</div>
        <div class="flap"></div>
      </div>
    </div>

    <button id="openBtn" class="glass-btn">
      <span class="sheen"></span>
      <span class="label">Open it</span>
    </button>
  </div>
</section>

<!-- Letter -->
<section id="letterSection" class="screen">
  <div class="glass panel letterPanel">
    <div class="sheen"></div>
    <h2>Happy 4 Months, Bachuu ❤️</h2>

    <div class="progressTrack">
      <div id="progressFill" class="progressFill"></div>
    </div>

    <div id="letterScroll" class="letterScroll">
      <div id="letterText" class="letterText"></div>
      <div class="scrollHint" id="scrollHint">keep scrolling ↓</div>
    </div>

    <button id="continueBtn1" class="glass-btn locked" disabled>
      <span class="sheen"></span>
      <span class="label">Continue →</span>
    </button>
  </div>
</section>

<!-- Cat -->
<section id="catSection" class="screen">
  <div class="glass panel catPanel">
    <div class="sheen"></div>
    <img src="cat.png" id="cat" alt="cat holding flowers">
    <div class="bubble glass-bubble">hehe i got u lilies 🤍🌸</div>
    <button id="continueBtn2" class="glass-btn">
      <span class="sheen"></span>
      <span class="label">Continue →</span>
    </button>
  </div>
</section>

<!-- Ending -->
<section id="ending" class="screen">
  <div class="glass panel final">
    <div class="sheen"></div>
    <h1>Happy 4 Months<br>Bachuu ❤️</h1>
    <p>Thank you for being my favourite person.<br>I love you more than words can ever explain. 🤍</p>
  </div>
</section>

<audio id="music" preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
